        // Day Navigation Component
        function DayNavigation({ currentDate, setCurrentDate }) {
            const currentIndex = dates.indexOf(currentDate);
            const dayNumber = currentIndex + 1;

            const goToPrevious = () => {
                if (currentIndex > 0) {
                    setCurrentDate(dates[currentIndex - 1]);
                }
            };

            const goToNext = () => {
                if (currentIndex < dates.length - 1) {
                    setCurrentDate(dates[currentIndex + 1]);
                }
            };

            return (
                <div className="fixed bottom-16 left-0 right-0 bg-white border-t border-b shadow-sm">
                    <div className="flex items-center justify-between px-4 py-3">
                        <button
                            onClick={goToPrevious}
                            disabled={currentIndex === 0}
                            className={`flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-colors ${
                                currentIndex === 0 
                                    ? 'text-gray-400 cursor-not-allowed' 
                                    : 'text-indigo-600 hover:bg-indigo-50'
                            }`}
                        >
                            ← Previous
                        </button>

                        <div className="text-center">
                            <div className="text-lg font-bold text-gray-800">
                                {new Date(currentDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
                            </div>
                            <div className="text-sm text-gray-600">Day {dayNumber} of {dates.length}</div>
                        </div>

                        <button
                            onClick={goToNext}
                            disabled={currentIndex === dates.length - 1}
                            className={`flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-colors ${
                                currentIndex === dates.length - 1 
                                    ? 'text-gray-400 cursor-not-allowed'

                        <div className="grid grid-cols-2 gap-4">
                            <div className="text-center">
                                <div className="text-2xl font-bold text-indigo-600">¥{dayData.dayTotal.yen.toLocaleString()}</div>
                                <div className="text-sm text-indigo-500">Japanese Yen</div>
                            </div>
                            <div className="text-center">
                                <div className="text-2xl font-bold text-indigo-600">${dayData.dayTotal.usd.toFixed(2)}</div>
                                <div className="text-sm text-indigo-500">US Dollars</div>
                            </div>
                        </div>

                        <div className="mt-4 pt-4 border-t border-indigo-200">
                            <h4 className="font-medium text-sm mb-2 text-indigo-700">Breakdown:</h4>
                            <div className="space-y-1 text-sm">
                                {Object.entries(dayData.costBreakdown).map(([category, cost]) => (
                                    <div key={category} className="flex justify-between text-indigo-600">
                                        <span className="capitalize">{category}:</span>
                                        <span>¥{cost.yen.toLocaleString()} (${cost.usd.toFixed(2)})</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Overview View Component
        function OverviewView({ currentDate, setCurrentDate }) {
            return (
                <div className="p-4">
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">Trip Overview</h2>

                    <div className="space-y-4">
                        {dates.map((date, index) => {
                            const dayData = itineraryData[date];
                            const isActive = date === currentDate;

                            return (
                                <div
                                    key={date}
                                    onClick={() => setCurrentDate(date)}
                                    className={`p-4 rounded-xl border-2 cursor-pointer transition-all duration-200 ${
                                        isActive 
                                            ? 'border-indigo-500 bg-indigo-50' 
                                            : 'border-gray-200 bg-white hover:border-indigo-300'
                                    }`}
                                >
                                    <div className="flex items-center justify-between">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-3 mb-2">
                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${
                                                    isActive ? 'bg-indigo-500 text-white' : 'bg-gray-200 text-gray-600'
                                                }`}>
                                                    {index + 1}
                                                </div>
                                                <div>
                                                    <h3 className="font-bold text-lg text-gray-800">{dayData.title}</h3>
                                                    <p className="text-sm text-gray-600">
                                                        {new Date(date).toLocaleDateString('en-US', { 
                                                            weekday: 'long', 
                                                            month: 'short', 
                                                            day: 'numeric' 
                                                        })}
                                                    </p>
                                                </div>
                                            </div>

                                            <div className="flex items-center gap-4 text-sm text-gray-600">
                                                <span>{dayData.activities.length} activities</span>
                                                <span>•</span>
                                                <span>¥{dayData.dayTotal.yen.toLocaleString()}</span>
                                                <span>•</span>
                                                <span>${dayData.dayTotal.usd.toFixed(2)}</span>
                                            </div>
                                        </div>

                                        <span className="text-gray-400">→</span>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <div className="mt-6 p-4 bg-gradient-to-r from-green-50 to-emerald-50 rounded-xl border border-green-200">
                        <h3 className="font-bold text-lg mb-3 text-green-800">Trip Totals</h3>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="text-center">
                                <div className="text-2xl font-bold text-green-600">¥{totalBudget.yen.toLocaleString()}</div>
                                <div className="text-sm text-green-500">Total Yen</div>
                            </div>
                            <div className="text-center">
                                <div className="text-2xl font-bold text-green-600">${totalBudget.usd.toFixed(2)}</div>
                                <div className="text-sm text-green-500">Total USD</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Budget View Component
        function BudgetView() {
            const categoryTotals = {};

            Object.values(itineraryData).forEach(day => {
                Object.entries(day.costBreakdown).forEach(([category, cost]) => {
                    if (!categoryTotals[category]) {
                        categoryTotals[category] = { yen: 0, usd: 0 };
                    }
                    categoryTotals[category].yen += cost.yen;
                    categoryTotals[category].usd += cost.usd;
                });
            });

            const categoryColors = {
                food: 'bg-red-100 text-red-800 border-red-200',
                transport: 'bg-green-100 text-green-800 border-green-200',
                attractions: 'bg-blue-100 text-blue-800 border-blue-200',
                nightlife: 'bg-purple-100 text-purple-800 border-purple-200',
                festival: 'bg-amber-100 text-amber-800 border-amber-200',
                snacks: 'bg-orange-100 text-orange-800 border-orange-200'
            };

            const categoryIcons = {
                food: '🍜',
                transport: '🚆',
                attractions: '📸',
                nightlife: '🍸',
                festival: '🎌',
                snacks: '🍡'
            };

            return (
                <div className="p-4">
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">Budget Breakdown</h2>

                    <div className="mb-6 p-6 bg-gradient-to-r from-indigo-50 to-blue-50 rounded-xl border border-indigo-200">
                        <h3 className="font-bold text-lg mb-3 text-indigo-800">Total Budget</h3>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="text-center">
                                <div className="text-3xl font-bold text-indigo-600">¥{totalBudget.yen.toLocaleString()}</div>
                                <div className="text-sm text-indigo-500">Japanese Yen</div>
                            </div>
                            <div className="text-center">
                                <div className="text-3xl font-bold text-indigo-600">${totalBudget.usd.toFixed(2)}</div>
                                <div className="text-sm text-indigo-500">US Dollars</div>
                            </div>
                        </div>
                    </div>

                    <div className="mb-6">
                        <h3 className="font-bold text-lg mb-4 text-gray-800">By Category</h3>
                        <div className="space-y-3">
                            {Object.entries(categoryTotals).map(([category, cost]) => {
                                const icon = categoryIcons[category] || '💰';
                                const colorClass = categoryColors[category] || 'bg-gray-100 text-gray-800 border-gray-200';
                                const percentage = ((cost.usd / totalBudget.usd) * 100).toFixed(1);

                                return (
                                    <div key={category} className={`p-4 rounded-lg border ${colorClass}`}>
                                        <div className="flex items-center justify-between mb-2">
                                            <div className="flex items-center gap-3">
                                                <span className="text-xl">{icon}</span>
                                                <span className="font-medium capitalize">{category}</span>
                                            </div>
                                            <span className="text-sm font-medium">{percentage}%</span>
                                        </div>
                                        <div className="flex justify-between text-sm">
                                            <span>¥{cost.yen.toLocaleString()}</span>
                                            <span>${cost.usd.toFixed(2)}</span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div>
                        <h3 className="font-bold text-lg mb-4 text-gray-800">Daily Breakdown</h3>
                        <div className="space-y-2">
                            {dates.map((date, index) => {
                                const dayData = itineraryData[date];
                                return (
                                    <div key={date} className="p-3 bg-white rounded-lg border border-gray-200">
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <span className="font-medium text-gray-800">Day {index + 1}</span>
                                                <span className="text-sm text-gray-600 ml-2">
                                                    {new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
                                                </span>
                                            </div>
                                            <div className="text-right">
                                                <div className="font-medium text-gray-800">¥{dayData.dayTotal.yen.toLocaleString()}</div>
                                                <div className="text-sm text-gray-600">${dayData.dayTotal.usd.toFixed(2)}</div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        // Bottom Navigation Component
        function BottomTabs({ activeTab, setActiveTab }) {
            const tabs = [
                { id: 'today', label: 'Today', icon: '📅' },
                { id: 'overview', label: 'Overview', icon: '📍' },
                { id: 'budget', label: 'Budget', icon: '💰' }
            ];

            return (
                <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg">
                    <div className="flex">
                        {tabs.map(tab => {
                            const isActive = activeTab === tab.id;

                            return (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex-1 py-3 px-4 flex flex-col items-center gap-1 transition-colors ${
                                        isActive 
                                            ? 'text-indigo-600 bg-indigo-50' 
                                            : 'text-gray-600 hover:text-indigo-500'
                                    }`}
                                >
                                    <span className="text-xl">{tab.icon}</span>
                                    <span className="text-xs font-medium">{tab.label}</span>
                                </button>
                            );
                        })}
                    </div>
                </nav>
            );
        }

        // Main App Component
        function JapanTravelApp() {
            const [activeTab, setActiveTab] = useState('today');
            const [currentDate, setCurrentDate] = useState('2025-07-14');

            const renderContent = () => {
                switch (activeTab) {
                    case 'today':
                        return <TodayView currentDate={currentDate} />;
                    case 'overview':
                        return <OverviewView currentDate={currentDate} setCurrentDate={setCurrentDate} />;
                    case 'budget':
                        return <BudgetView />;
                    default:
                        return <TodayView currentDate={currentDate} />;
                }
            };

            return (
                <div className="min-h-screen gradient-bg">
                    <Header />

                    <main className="pb-32">
                        {renderContent()}
                    </main>

                    {activeTab === 'today' && (
                        <DayNavigation currentDate={currentDate} setCurrentDate={setCurrentDate} />
                    )}

                    <BottomTabs activeTab={activeTab} setActiveTab={setActiveTab} />
                </div>
            );
        }

        // Render the app
        ReactDOM.render(<JapanTravelApp />, document.getElementById('root'));
    </script>
</body>
</html>
